<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NamzNE - Link in Bio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {

        .custom-card {
            background-color: #141414;
            border: 1px solid #1f1f1f;
            transition: all 0.2s ease-in-out;
        }
        .custom-card:hover {

<body class="text-white flex flex-col items-center justify-start min-h-screen px-4 py-8">

    <div class="flex flex-col items-center text-center mt-6 mb-8">

                </div>

                    <p class="text-xs text-gray-500">vipibmstore.com</p>
                </div>
            </div>
            <a href="https://vipibmstore.com" target="_blank" class="px-4 py-2 bg-zinc-800 text-xs font-semibold rounded-full hover:bg-zinc-700 transition">
                Buy Now
            </a>
        </div>

        <a href="#" target="_blank" class="custom-card flex items-center p-4 rounded-2xl block">
            <div class="w-12 h-12 rounded-xl bg-green-950/50 border border-green-800/30 flex items-center justify-center text-green-400 text-xl mr-4">

        <a href="#" target="_blank" class="custom-card flex items-center p-4 rounded-2xl block">

                <i class="fa-brands fa-whatsapp"></i>
            </div>
            <div>
                <h2 class="text-sm font-bold tracking-wide text-gray-200 uppercase">WHATSAPP ADMIN</h2>
                <p class="text-xs text-gray-500">Fast Response Support</p>
            </div>
        </a>

    </div>

    <div class="fixed bottom-6 right-6">
        <button class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center shadow-xl hover:scale-105 transition-transform duration-200">
            <i class="fa-regular fa-comment-dots text-2xl"></i>
        </button>
    </div>

</body>
</html>
